# Production profile — all sensitive values must come from environment variables
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# Connection pool tuning for production
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Actuator — restrict exposure in production
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.endpoint.metrics.enabled=true
# Logging — minimal in production
logging.level.com.haritara=WARN
logging.level.root=WARN
logging.level.org.springframework.security=ERROR
# Security headers enabled
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
# Rate limiting stricter in production
app.rate-limit.enabled=true
app.rate-limit.requests-per-minute=50
# Cache configuration for production (use Redis)
spring.cache.type=redis
spring.redis.url=${REDIS_URL:redis://localhost:6379}
